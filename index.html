<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Star Tracker">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e1b4b">
    
    <title>Kids Star Tracker Pro v3.5</title>
    
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            --card-bg: rgba(30, 41, 59, 0.75);
            --blue: #38bdf8;
            --blue-glow: rgba(56, 189, 248, 0.5);
            --gold: #fbbf24;
            --gold-glow: rgba(251, 191, 36, 0.6);
            --pink: #f472b6;
            --pink-glow: rgba(244, 114, 182, 0.5);
            --green: #4ade80;
            --purple: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.5);
            --text: #ffffff;
            --success: #22c55e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; }

        body {
            margin: 0;
            padding: max(10px, env(safe-area-inset-top)) 15px env(safe-area-inset-bottom) 15px;
            background: var(--bg-gradient);
            color: var(--text);
            font-family: 'Baloo 2', cursive, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #app {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            overflow-y: auto;
            padding-bottom: 120px;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 0 15px 0; 
        }
        
        .header-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        h1 { 
            font-size: 2.1rem; 
            margin: 0; 
            line-height: 1;
            background: linear-gradient(to right, #fbbf24, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            text-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
            font-weight: 800;
        }

        .version-bar {
            display: flex; justify-content: flex-start; align-items: center; gap: 8px;
            font-size: 0.85rem; color: #94a3b8; font-weight: bold; margin-top: 4px; letter-spacing: 1px;
            height: 24px;
        }
        
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 8px #ef4444; transition: all 0.3s ease;
        }

        .btn-info {
            background: rgba(255, 255, 255, 0.1); border: 1px solid var(--blue); color: var(--blue);
            padding: 8px 12px; border-radius: 18px; font-family: 'Baloo 2'; font-weight: 800; font-size: 0.95rem;
            cursor: pointer; margin: 0; box-shadow: 0 4px 10px rgba(56, 189, 248, 0.2); transition: all 0.2s;
        }
        .btn-info:active { transform: scale(0.95); }

        .kids-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 5px; }
        @media (min-width: 700px) { .kids-grid { grid-template-columns: 1fr 1fr; } }

        .kid-card {
            background: var(--card-bg); border-radius: 35px; padding: 20px 25px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            backdrop-filter: blur(15px); display: flex; flex-direction: column;
        }

        .kid-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .kid-info-box { display: flex; align-items: center; gap: 15px; }
        .kid-header h2 { margin: 0; font-size: 2rem; font-weight: 800; line-height: 1.1; }
        
        .total-score-badge {
            background: linear-gradient(135deg, var(--gold), #f59e0b); color: #000; font-size: 1.3rem;
            font-weight: 900; padding: 4px 12px; border-radius: 15px; box-shadow: 0 4px 10px rgba(251, 191, 36, 0.4);
            white-space: nowrap;
        }

        .btn-kid-reset {
            background: rgba(255, 255, 255, 0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; cursor: pointer;
        }

        .avatar-btn { 
            font-size: 55px; background: rgba(255,255,255,0.08); border-radius: 20px; padding: 5px; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.15); box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; min-width: 80px; min-height: 80px;
        }

        .tally-box {
            background: rgba(0,0,0,0.3); border-radius: 20px; min-height: 70px; padding: 10px;
            display: flex; flex-wrap: wrap; align-content: center; justify-content: center; gap: 6px;
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px;
        }

        .star-icon { font-size: 1.8rem; color: var(--gold); text-shadow: 0 0 10px var(--gold-glow); animation: popStar 0.4s forwards; }
        @keyframes popStar { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }

        .btn-claim {
            background: linear-gradient(135deg, var(--green), #16a34a); color: white; border: none; padding: 12px;
            border-radius: 15px; font-weight: 800; font-size: 1.1rem; cursor: pointer; width: 100%; margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4); animation: pulseBtn 2s infinite; font-family: 'Baloo 2';
            border: 2px solid #bbf7d0;
        }
        @keyframes pulseBtn { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .progress-section { background: rgba(0,0,0,0.25); padding: 15px; border-radius: 20px; margin-bottom: 15px; }
        .progress-title { font-size: 1.1rem; color: #f8fafc; font-weight: 800; margin: 0 0 15px 0; text-align: center; }
        .progress-item { margin-bottom: 16px; }
        .progress-item:last-child { margin-bottom: 0; }
        .progress-label { display: flex; justify-content: space-between; align-items: flex-end; font-size: 0.95rem; color: #f8fafc; font-weight: 700; margin-bottom: 8px; }
        .goal-name { font-size: 1.1rem; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .stars-left { background: rgba(0,0,0,0.4); padding: 3px 10px; border-radius: 12px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.1); font-weight: 800; }
        .stars-left.done { background: var(--success); color: white; border-color: #bbf7d0; animation: pulseBtn 2s infinite; box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        .progress-bg { background: rgba(0,0,0,0.6); height: 26px; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); box-shadow: inset 0 3px 6px rgba(0,0,0,0.6); }
        .progress-fill { height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); animation: moveStripes 2s linear infinite; background-size: 30px 30px; background-image: linear-gradient(45deg, rgba(255,255,255,0.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.15) 75%, transparent 75%, transparent); }
        
        .fill-small { background-color: var(--pink); box-shadow: 0 0 10px var(--pink-glow); }
        .fill-big { background-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }
        .fill-mega { background-color: var(--purple); box-shadow: 0 0 10px var(--purple-glow); }

        .controls { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-top: auto; }
        .btn-action {
            border: none; border-radius: 20px; font-weight: 800; font-size: 2.5rem; cursor: pointer; height: 70px;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.3); transition: transform 0.1s;
        }
        .btn-action:active { transform: scale(0.95); }
        .btn-minus { background: #334155; color: #94a3b8; }
        .btn-plus { background: linear-gradient(135deg, #0ea5e9, #6366f1, #d946ef); color: white; border: 1px solid rgba(255,255,255,0.2); }

        .toolbar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px;
            background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(15px); padding: 15px; border-radius: 40px;
            display: flex; justify-content: center; align-items: center; z-index: 50; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .toolbar-btn { background:none; color:white; font-weight:800; border:none; cursor:pointer; font-size: 1.1rem; font-family:'Baloo 2'; flex: 1; }

        .modal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content-scroll {
            background: var(--card-bg); width: 100%; max-width: 450px; max-height: 85vh; padding: 25px; 
            border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); overflow-y: auto; position: relative;
        }

        .btn-close-top {
            position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); color: white;
            border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; cursor: pointer;
        }

        .tasks-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .task-btn-item {
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); padding: 12px 10px; border-radius: 18px;
            display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; gap: 6px; transition: background 0.2s;
        }
        .task-btn-item:active { background: rgba(255,255,255,0.1); }
        .task-btn-points { background: var(--gold); color: #000; padding: 3px 10px; border-radius: 12px; font-weight: 800; font-size: 0.95rem; }

        .edit-task-row { display: grid; grid-template-columns: 3fr 1fr 40px; gap: 10px; align-items: center; margin-bottom: 10px; }
        .config-card { margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .config-card input { width: 100%; padding: 12px; margin: 5px 0 12px 0; background: rgba(0,0,0,0.4); border: 1px solid #475569; color: white; border-radius: 15px; font-family: 'Baloo 2'; font-weight: 600;}
        
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 320px; }
        .btn-key { background: rgba(255,255,255,0.05); color: white; height: 75px; font-size: 2rem; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; font-family: 'Baloo 2'; font-weight: 800; }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 30px; }
        .dot { width: 20px; height: 20px; border: 2px solid #64748b; border-radius: 50%; }
        .dot.filled { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 10px var(--blue); }

        .icon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 10px 0; }
        .icon-choice { font-size: 3.5rem; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 5px; cursor: pointer; transition: all 0.2s; width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        .history-entry { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 18px; margin-bottom: 10px; }
        .history-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .history-date { font-size: 0.75rem; color: #94a3b8; font-weight: bold; }
        .history-pts { font-weight: 800; font-size: 1.1rem; }

        #loading-screen { position: fixed; inset: 0; background: var(--bg-gradient); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 60px; height: 60px; border: 6px solid rgba(56, 189, 248, 0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--blue); font-weight: bold;">Initialisiere Galaxie...</p>
    </div>

    <div id="message-box" style="position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--card-bg); padding: 15px 30px; border-radius: 25px; border: 2px solid var(--blue); z-index: 2000; display: none; font-weight: bold; text-align: center; backdrop-filter: blur(10px);"></div>

    <div id="app">
        <header>
            <div class="header-left">
                <h1>STAR TRACKER</h1>
                <div class="version-bar">
                    <span>v3.5 PRO</span>
                    <div id="status-dot" class="status-dot"></div>
                    <div id="unlock-status-container" style="margin-left: 6px; display: flex; align-items: center;"></div>
                </div>
            </div>
            <button class="btn-info" onclick="window.openTasksInfoModal()">📋 Aufgaben</button>
        </header>
        <div id="kids-container" class="kids-grid"></div>
    </div>

    <div class="toolbar">
        <button class="toolbar-btn" onclick="window.openHistoryModal()">📜 HISTORIE</button>
        <div style="width: 2px; height: 30px; background: rgba(255,255,255,0.2); margin: 0 10px; border-radius: 2px;"></div>
        <button class="toolbar-btn" onclick="window.checkPin(() => window.openConfig())">⚙️ SETTINGS</button>
    </div>

    <!-- Modals -->
    <div id="pin-modal" class="modal">
        <h2 style="font-size: 2.5rem; margin-bottom: 5px;">Geheimcode</h2>
        <div class="pin-dots" id="pin-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="pin-grid" id="pin-pad"></div>
        <button onclick="window.closeModal('pin-modal')" style="margin-top: 20px; background: none; color: #94a3b8; border:none; cursor:pointer; font-size: 1.2rem; font-family: 'Baloo 2';">Abbrechen</button>
    </div>

    <div id="add-points-modal" class="modal">
        <div class="modal-content-scroll">
            <button class="btn-close-top" onclick="window.closeModal('add-points-modal')">X</button>
            <h2 id="add-points-title" style="text-align: center; color: var(--gold); font-size: 2rem; margin-top: 0;">Sterne vergeben</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input id="custom-task-name" type="text" placeholder="Eigene Aufgabe..." style="flex: 1; padding: 12px; border-radius: 15px; border: 1px solid #475569; background: rgba(0,0,0,0.3); color: white; font-family: 'Baloo 2';">
                <input id="custom-task-pts" type="number" step="0.5" placeholder="Pts" style="width: 70px; padding: 12px; border-radius: 15px; border: 1px solid #475569; background: rgba(0,0,0,0.3); color: white; font-family: 'Baloo 2'; text-align: center;">
                <button onclick="window.addCustomPoints()" style="background: var(--green); color: white; border: none; border-radius: 15px; padding: 0 15px; font-family: 'Baloo 2'; font-weight: bold;">OK</button>
            </div>
            <div id="add-tasks-list" class="tasks-grid"></div>
        </div>
    </div>

    <div id="config-modal" class="modal">
        <div class="modal-content-scroll">
            <button class="btn-close-top" onclick="window.closeModal('config-modal')">X</button>
            <h2 style="text-align: center; color: var(--blue); font-size: 2rem; margin-top: 0;">Einstellungen</h2>
            <div id="config-kids-fields"></div>
            
            <h3 style="color: var(--gold); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-top: 30px;">📋 Aufgaben-Editor</h3>
            <div id="config-tasks-fields"></div>
            <button onclick="window.loadDefaultTasks()" style="width:100%; padding:12px; border-radius:15px; background:rgba(56,189,248,0.1); color:var(--blue); border:1px solid var(--blue); margin-bottom:10px; font-family: 'Baloo 2'; font-weight: bold; cursor: pointer;">📋 Standardaufgaben laden</button>
            <button onclick="window.addNewTaskInput()" style="width:100%; padding:12px; border-radius:15px; background:none; color:white; border:1px dashed white; margin-bottom:20px; font-family: 'Baloo 2'; font-weight: bold; cursor: pointer;">+ Neue Aufgabe</button>
            
            <button onclick="window.saveConfig()" style="width:100%; padding:18px; border-radius:20px; background:var(--blue); color:white; font-weight:900; font-size: 1.2rem; border:none; cursor: pointer; font-family: 'Baloo 2'; margin-top: 10px;">SPEICHERN</button>
            <button onclick="window.checkPin(() => window.triggerResetSystem())" style="width:100%; padding:15px; border-radius:20px; background:linear-gradient(135deg, #ef4444, #b91c1c); color:white; font-weight:800; border:none; margin-top:20px; font-family: 'Baloo 2'; cursor: pointer;">⚠️ ZÄHLER AUF NULL</button>
        </div>
    </div>

    <div id="confirm-reset-modal" class="modal">
        <div class="modal-content-scroll" style="text-align: center;">
            <h2 style="color: #ef4444; font-size: 2rem; margin-top: 0;">Punkte löschen?</h2>
            <p style="font-size: 1.1rem;">Dies setzt die Zähler aller Kinder dauerhaft auf 0. Die Historie bleibt erhalten.</p>
            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button onclick="window.closeModal('confirm-reset-modal')" style="flex: 1; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.1); color: white; border:none; font-family: 'Baloo 2'; font-weight: bold; cursor: pointer;">Abbrechen</button>
                <button onclick="window.executeMasterReset()" style="flex: 1; padding: 15px; border-radius: 15px; background: #ef4444; color: white; border:none; font-family: 'Baloo 2'; font-weight: bold; cursor: pointer;">Löschen</button>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal">
        <div class="modal-content-scroll">
            <button class="btn-close-top" onclick="window.closeModal('history-modal')">X</button>
            <h2 style="margin-top: 0; font-size: 2rem;">📜 Historie</h2>
            <div id="history-list"></div>
            <div id="history-footer" style="margin-top: 20px;"></div>
        </div>
    </div>
    
    <div id="info-modal" class="modal">
        <div class="modal-content-scroll">
            <button class="btn-close-top" onclick="window.closeModal('info-modal')">X</button>
            <h2 style="margin-top: 0; font-size: 2rem;">📋 Ziele & Aufgaben</h2>
            <div id="info-goals-list"></div><br>
            <div id="info-tasks-list" class="tasks-grid"></div>
        </div>
    </div>
    
    <div id="icon-modal" class="modal">
        <div class="modal-content-scroll" style="max-width: 500px;">
            <button class="btn-close-top" onclick="window.closeModal('icon-modal')">X</button>

            <div id="icon-grid" class="icon-grid"></div>

            kids: [
                { id: 0, name: 'Noelle', icon: '🦄', count: 0, ackTens: 0, sGoal: '1h Gamen/TV', bGoal: '20.- / Shoppen', megaGoal: 'Europa-Park', valSmall: 10, valBig: 100, valMega: 300 },
                { id: 1, name: 'Levi', icon: '🚀', count: 0, ackTens: 0, sGoal: '1h Gamen/TV', bGoal: '20.- / Shoppen', megaGoal: 'Trampolinpark', valSmall: 10, valBig: 100, valMega: 300 }
            ],
            tasks: [], 
            history: []
        };

        let lastUnlockTime = 0, currentPin = "", pendingAction = null, activeKidForIcon = null, activeKidForPoints = null;
        let auth, db, user, firebaseReady = false;

        const openModal = (id) => document.getElementById(id).classList.add('active');
        const closeModal = (id) => document.getElementById(id).classList.remove('active');
        const showMessage = (t) => { const b = document.getElementById('message-box'); b.innerText = t; b.style.display = 'block'; setTimeout(() => b.style.display = 'none', 3000); };
        const setStatus = (s) => { const d = document.getElementById('status-dot'); d.style.background = s === 'online' ? '#22c55e' : (s === 'connecting' ? '#eab308' : '#ef4444'); };

        window.openModal = openModal;
        window.closeModal = closeModal;

        async function initSync() {
            setStatus('connecting');
            const isSandbox = typeof __firebase_config !== 'undefined' && __firebase_config;
            const config = isSandbox ? JSON.parse(__firebase_config) : MY_CONFIG;
            const appId = typeof __app_id !== 'undefined' ? __app_id : config.projectId;
            
            try {
                const app = initializeApp(config);
                db = getFirestore(app);

                const startFirestore = () => {
                    if (firebaseReady) return;
                    firebaseReady = true;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'sync', 'state');
                    
                    onSnapshot(docRef, (docSnap) => {
                        document.getElementById('loading-screen').style.display = 'none';
                        setStatus('online');
                        if (docSnap.exists()) {
                            state = docSnap.data();
                            if(!state.history) state.history = [];
                            // Sicherstellen, dass Aufgaben existieren. Wenn Liste leer, Standard laden (Fixe Hinterlegung).
                            if(!state.tasks || state.tasks.length === 0) {
                                state.tasks = DEFAULT_TASKS_POOL.map((t, i) => ({ ...t, id: i + 1 }));
                            }
                            render();
                        } else {
                            state.tasks = DEFAULT_TASKS_POOL.map((t, i) => ({ ...t, id: i + 1 }));
                            setDoc(docRef, state);
                            render();
                        }
                    }, (err) => {
                        console.error("Firestore Error:", err);
                        setStatus('offline');
                        document.getElementById('loading-screen').style.display = 'none';
                        render();
                    });
                };

                if (isSandbox) {
                    auth = getAuth(app);
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            return await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            return await signInAnonymously(auth);
                        }
                    };

                    await initAuth().catch(e => console.warn("Auth Error:", e));
                    
                    onAuthStateChanged(auth, (u) => {
                        user = u;
                        if (user) {
                            startFirestore();
                        }
                    });
                } 
                else {
                    startFirestore();
                }

            } catch (e) {
                console.error("Firebase Init Error:", e);
                setStatus('offline');
                document.getElementById('loading-screen').style.display = 'none';
                render();
            }
        }

        async function syncToCloud() {
            const isSandbox = typeof __firebase_config !== 'undefined' && __firebase_config;
            if (!firebaseReady || (isSandbox && !user)) return;
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : MY_CONFIG.projectId;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'sync', 'state');
                await setDoc(docRef, state);
            } catch (e) {
                console.error("Sync Save Error:", e);
                setStatus('offline');
            }
        }

        function render() {
            const container = document.getElementById('kids-container');
            container.innerHTML = '';
            
            state.kids.forEach(k => {
                const step = k.valSmall || 10;
                const count = Math.round((k.count || 0) * 10) / 10;
                
                // --- NEUE BERECHNUNG: Balken bleibt voll, bis Belohnung abgeholt wird ---
                const ackTens = k.ackTens || 0;
                const activeSmallPoints = Math.max(0, count - (ackTens * step));
                const visualSmallPoints = Math.min(step, activeSmallPoints);
                const unclaimed = Math.floor(activeSmallPoints / step);
                
                // Prozentuale Fortschritte
                const progSmall = (visualSmallPoints / step) * 100;
                const progBig = Math.min(100, (count / (k.valBig || 100)) * 100);
                const progMega = Math.min(100, (count / (k.valMega || 300)) * 100);
                
                const starsForNextSmall = Math.round((step - visualSmallPoints) * 10) / 10;
                const starsForBig = Math.max(0, Math.ceil((k.valBig || 100) - count));
                const starsForMega = Math.max(0, Math.ceil((k.valMega || 300) - count));

                const textSmall = unclaimed > 0 ? '<span class="stars-left done">🎁 Abholen!</span>' : `<span class="stars-left">Noch ${starsForNextSmall} ⭐</span>`;
                const textBig = starsForBig === 0 ? '<span class="stars-left done">🎉 GESCHAFFT!</span>' : `<span class="stars-left">Noch ${starsForBig} ⭐</span>`;
                const textMega = starsForMega === 0 ? '<span class="stars-left done">🎉 GESCHAFFT!</span>' : `<span class="stars-left">Noch ${starsForMega} ⭐</span>`;

                // Sterne Box (Tally)
                let tallyHtml = '';
                if (unclaimed > 0) {
                    tallyHtml = '<span style="color:var(--gold); font-weight:800; font-size:1.1rem; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);">Ziel erreicht! Belohnung abholen! 🎁</span>';
                } else if (visualSmallPoints === 0) {
                    tallyHtml = `<span style="color:rgba(255,255,255,0.4); font-weight:bold; font-size:0.9rem;">0 / ${step} Sternen gesammelt</span>`;
                } else {
                    for(let i=0; i<Math.floor(visualSmallPoints); i++) tallyHtml += '<div class="star-icon">⭐</div>';
                    if(visualSmallPoints % 1 !== 0) tallyHtml += '<div class="star-icon" style="opacity:0.7;font-size:1.4rem">🌟</div>';
                }

                // Abholen-Button, falls ein oder mehrere Etappenziele erreicht wurden
                let claimHtml = '';
                if (unclaimed > 0) {
                    const btnText = unclaimed > 1 ? `🎁 ${unclaimed}x Belohnung abholen!` : `🎁 Belohnung abholen!`;
                    claimHtml = `<button class="btn-claim" onclick="window.acknowledgeTen(${k.id})">${btnText}</button>`;
                }

                container.innerHTML += `
                    <div class="kid-card">
                        <div class="kid-header">
                            <div class="kid-info-box">
                                <div class="avatar-btn" onclick="window.openIconPicker(${k.id})">${k.icon}</div>
                                <div>
                                    <h2>${k.name}</h2>
                                    <div class="total-score-badge">${count} ⭐</div>
                                </div>
                            </div>
                            <button class="btn-kid-reset" onclick="window.checkPin(()=>window.resetKid(${k.id}))">↺ Rücksetzen</button>
                        </div>
                        
                        <div class="tally-box">${tallyHtml}</div>
                        ${claimHtml}

                        <div class="progress-section">
                            <h3 class="progress-title">🌟 Dein Weg zu den Belohnungen</h3>
                            <div class="progress-item">
                                <div class="progress-label"><span class="goal-name" style="color: var(--pink)">🎁 ${k.sGoal}</span>${textSmall}</div>
                                <div class="progress-bg"><div class="progress-fill fill-small" style="width:${progSmall}%"></div></div>
                            </div>
                            <div class="progress-item">
                                <div class="progress-label"><span class="goal-name" style="color: var(--gold)">🏆 ${k.bGoal}</span>${textBig}</div>
                                <div class="progress-bg"><div class="progress-fill fill-big" style="width:${progBig}%"></div></div>
                            </div>
                            <div class="progress-item">
                                <div class="progress-label"><span class="goal-name" style="color: var(--purple)">💎 ${k.megaGoal}</span>${textMega}</div>
                                <div class="progress-bg"><div class="progress-fill fill-mega" style="width:${progMega}%"></div></div>
                            </div>
                        </div>

                        <div class="controls">
                            <button class="btn-action btn-minus" onclick="window.checkPin(()=>window.updateCount(${k.id}, -0.5, 'Abzug'))">-</button>
                            <button class="btn-action btn-plus" onclick="window.checkPin(()=>window.openAddPointsModal(${k.id}))">+</button>
                        </div>
                    </div>`;
            });
        }

        window.updateCount = (id, v, taskName) => {
            const k = state.kids.find(x => x.id === id);
            const oldScore = k.count || 0;
            const newScore = Math.max(0, Math.round((oldScore + v) * 10) / 10);
            k.count = newScore;
            
            // Konfetti-Logik: Nur wenn Ziele überschritten werden
            if (v > 0) {
                const crossedSmall = Math.floor(oldScore / (k.valSmall || 10)) < Math.floor(newScore / (k.valSmall || 10));
                const crossedBig = Math.floor(oldScore / (k.valBig || 100)) < Math.floor(newScore / (k.valBig || 100));
                const crossedMega = Math.floor(oldScore / (k.valMega || 300)) < Math.floor(newScore / (k.valMega || 300));

                if (crossedMega) {
                    // Feuerwerk für 300er Ziel
                    let duration = 5 * 1000;
                    let animationEnd = Date.now() + duration;
                    let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 3000 };
                    function randomInRange(min, max) { return Math.random() * (max - min) + min; }
                    let interval = setInterval(function() {
                        let timeLeft = animationEnd - Date.now();
                        if (timeLeft <= 0) return clearInterval(interval);
                        let particleCount = 50 * (timeLeft / duration);
                        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
                    }, 250);
                } else if (crossedBig) {
                    // Mehr Konfetti für 100er Ziel
                    confetti({ particleCount: 300, spread: 160, origin: { y: 0.4 }, zIndex: 3000 });
                    setTimeout(() => confetti({ particleCount: 200, spread: 120, origin: { y: 0.5 }, zIndex: 3000 }), 500);
                } else if (crossedSmall) {
                    // Kleines Konfetti für 10er Etappenziel
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, zIndex: 3000 });
                }
            }

            state.history.push({ kidName: k.name, points: v, taskName, timestamp: Date.now() });
            if (state.history.length > 200) state.history.shift(); 
            render(); syncToCloud();
        };

        window.acknowledgeTen = (id) => { 
            const k = state.kids.find(x => x.id === id);
            k.ackTens = (k.ackTens || 0) + 1; 
            // Nur noch ein winziger Poof beim Abholen, da die Feier schon beim Punktesammeln passiert
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 }, zIndex: 3000 });
            showMessage("🎉 Belohnung abgeholt! 🎉");
            render(); 
            syncToCloud(); 
        };

        window.resetKid = (id) => { 
            const k = state.kids.find(x => x.id === id); 
            k.count = 0; 
            k.ackTens = 0;
            render(); 
            syncToCloud(); 
        };

        window.triggerResetSystem = () => openModal('confirm-reset-modal');
        window.executeMasterReset = () => { 
            state.kids.forEach(k => { k.count = 0; k.ackTens = 0; }); 
            closeModal('confirm-reset-modal'); closeModal('config-modal'); 
            render(); syncToCloud(); showMessage("Zähler auf 0 gesetzt! ✅"); 
        };

        window.clearHistory = () => { state.history = []; syncToCloud(); window.openHistoryModal(); showMessage("Historie gelöscht! 🗑️"); };

        window.openAddPointsModal = (kidId) => {
            activeKidForPoints = kidId;
            const l = document.getElementById('add-tasks-list');
            const sortedTasks = [...state.tasks].sort((a, b) => a.name.localeCompare(b.name));
            l.innerHTML = sortedTasks.map(t => `
                <div class="task-btn-item" onclick="window.addPoints(${t.points}, '${t.name.replace(/'/g, "\\'")}')">
                    <span class="task-btn-name" style="font-weight: 600;">${t.name}</span>
                    <span class="task-btn-points">+ ${t.points} ⭐</span>
                </div>`).join('');
            openModal('add-points-modal');
        };

        window.addPoints = (v, n) => { window.updateCount(activeKidForPoints, v, n); closeModal('add-points-modal'); showMessage(`Klasse! ${n} (+${v}⭐)`); };
        
        window.addCustomPoints = () => {
            const n = document.getElementById('custom-task-name').value.trim() || 'Manuell';
            const v = parseFloat(document.getElementById('custom-task-pts').value);
            if (!isNaN(v)) { window.updateCount(activeKidForPoints, v, n); closeModal('add-points-modal'); document.getElementById('custom-task-name').value=''; document.getElementById('custom-task-pts').value=''; showMessage(`Gut gemacht! (+${v}⭐)`); }
        };

        window.openConfig = () => {
            const c = document.getElementById('config-kids-fields');
            c.innerHTML = state.kids.map(k => `
                <div class="config-card">
                    <label style="color:var(--blue); font-weight:bold; font-size:1.1rem;">Profil: ${k.name}</label>
                    <input id="cn-${k.id}" value="${k.name}" placeholder="Name">
                    <div style="display:grid;grid-template-columns:3fr 1fr;gap:5px;">
                        <input id="cs-${k.id}" value="${k.sGoal}" placeholder="Etappenziel (Text)"> <input type="number" id="v1-${k.id}" value="${k.valSmall}" placeholder="Punkte">
                        <input id="cb-${k.id}" value="${k.bGoal}" placeholder="Großes Ziel (Text)"> <input type="number" id="v2-${k.id}" value="${k.valBig}" placeholder="Punkte">
                        <input id="cm-${k.id}" value="${k.megaGoal}" placeholder="Mega Ziel (Text)"> <input type="number" id="v3-${k.id}" value="${k.valMega}" placeholder="Punkte">
                    </div>
                </div>`).join('');
            window.renderTasksConfig();
            openModal('config-modal');
        };

        window.renderTasksConfig = () => {
            document.getElementById('config-tasks-fields').innerHTML = state.tasks.map((t, i) => `
                <div class="edit-task-row">
                    <input id="tn-${i}" value="${t.name}">
                    <input type="number" step="0.5" id="tp-${i}" value="${t.points}">
                    <button class="btn-del-task" onclick="window.removeTaskConfig(${i})" style="background:rgba(239,68,68,0.2); border:1px solid #ef4444; color:#fca5a5; border-radius:10px; height:45px; cursor:pointer;">🗑</button>
                </div>`).join('');
        };

        window.saveConfig = () => {
            state.kids.forEach(k => {
                k.name = document.getElementById(`cn-${k.id}`).value;
                k.sGoal = document.getElementById(`cs-${k.id}`).value;
                k.bGoal = document.getElementById(`cb-${k.id}`).value;
                k.megaGoal = document.getElementById(`cm-${k.id}`).value;
                k.valSmall = parseInt(document.getElementById(`v1-${k.id}`).value) || 10;
                k.valBig = parseInt(document.getElementById(`v2-${k.id}`).value) || 100;
                k.valMega = parseInt(document.getElementById(`v3-${k.id}`).value) || 300;
            });
            state.tasks.forEach((t, i) => { t.name = document.getElementById(`tn-${i}`).value; t.points = parseFloat(document.getElementById(`tp-${i}`).value); });
            state.tasks = state.tasks.filter(t => t.name.trim() !== "");
            closeModal('config-modal'); render(); syncToCloud();
            showMessage("Einstellungen gespeichert! 💾");
        };

        // Lade die hardcodierten Tasks aus DEFAULT_TASKS_POOL
        window.loadDefaultTasks = () => { 
            DEFAULT_TASKS_POOL.forEach(d => { 
                if(!state.tasks.some(t => t.name === d.name)) state.tasks.push({ ...d, id: Date.now() + Math.random() }); 
            }); 
            window.renderTasksConfig(); 
        };
        
        window.addNewTaskInput = () => { state.tasks.push({ id: Date.now(), name: '', points: 1 }); window.renderTasksConfig(); };
        window.removeTaskConfig = (i) => { state.tasks.splice(i, 1); window.renderTasksConfig(); };

        window.openHistoryModal = () => {
            const l = document.getElementById('history-list');
            const f = document.getElementById('history-footer');
            if (!state.history.length) { l.innerHTML = '<p style="text-align:center;">Keine Einträge.</p>'; f.innerHTML = ''; }
            else {
                l.innerHTML = [...state.history].reverse().map(h => {
                    const d = h.timestamp ? new Date(h.timestamp).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
                    return `<div class="history-entry"><div class="history-top"><b>${h.kidName}</b><div class="history-date">${d}</div></div><div style="display:flex;justify-content:space-between;align-items:center;"><div>${h.taskName}</div><div class="history-pts" style="color:${h.points>0?'var(--gold)':'#f87171'}">${h.points>0?'+':''}${h.points} ⭐</div></div></div>`;
                }).join('');
                f.innerHTML = `<button onclick="window.checkPin(() => window.clearHistory())" style="width:100%; padding:12px; border-radius:15px; background:rgba(239,68,68,0.1); color:#fca5a5; border:1px solid #ef4444; font-weight:bold; font-family:'Baloo 2'; cursor:pointer;">🗑️ Historie leeren</button>`;
            }
            openModal('history-modal');
        };

        window.openTasksInfoModal = () => {
            document.getElementById('info-goals-list').innerHTML = state.kids.map(k => `<div class="config-card"><b style="color:var(--blue); font-size:1.2rem;">${k.name}</b><br><span style="color:var(--pink)">🎁 ${k.valSmall}er:</span> ${k.sGoal}<br><span style="color:var(--gold)">🏆 ${k.valBig}er:</span> ${k.bGoal}<br><span style="color:var(--purple)">💎 ${k.valMega}er:</span> ${k.megaGoal}</div>`).join('');
            const s = [...state.tasks].sort((a, b) => a.name.localeCompare(b.name));
            document.getElementById('info-tasks-list').innerHTML = s.map(t => `<div class="task-btn-item"><span>${t.name}</span><span class="task-btn-points">${t.points} ⭐</span></div>`).join('');
            openModal('info-modal');
        };

        window.openIconPicker = (id) => { activeKidForIcon = id; const icons = ['🦄','🚀','🦖','🐉','🐶','🐱','🐭','🐰','🦁','🐼','🐻','🐨','🦊','🐵','🐸','🦋','🐞','🐝','🐢','🐬','🐳','🐆','🦸','🧙','👑','💎','⚡','🔥','🌈','🎮','🎨','🎸','🍕','🍔','🍭','🍿']; document.getElementById('icon-grid').innerHTML = icons.map(i => `<button class="icon-choice" onclick="window.selectIcon('${i}')">${i}</button>`).join(''); openModal('icon-modal'); };
        window.selectIcon = (i) => { state.kids.find(k => k.id === activeKidForIcon).icon = i; render(); syncToCloud(); closeModal('icon-modal'); };

        window.checkPin = (a) => { if (Date.now() - lastUnlockTime < UNLOCK_DURATION) a(); else { pendingAction = a; currentPin = ""; updatePinDots(); openModal('pin-modal'); } };
        function updatePinDots() { document.querySelectorAll('.dot').forEach((d, i) => d.className = i < currentPin.length ? 'dot filled' : 'dot'); }
        function manualLock() { lastUnlockTime = 0; updateUnlockDisplay(); showMessage("Gesperrt! 🔒"); }
        window.manualLock = manualLock;

        function updateUnlockDisplay() {
            const container = document.getElementById('unlock-status-container');
            const rTime = UNLOCK_DURATION - (Date.now() - lastUnlockTime);
            if (rTime > 0) {
                container.innerHTML = `<div style="display:flex;align-items:center;gap:6px;"><span style="color:var(--gold);font-weight:bold;font-size:0.8rem;">🔓 ${Math.ceil(rTime/1000)}s</span><button onclick="window.manualLock()" style="background:rgba(239,68,68,0.2);border:1px solid #ef4444;color:#fca5a5;padding:2px 6px;border-radius:8px;font-size:0.7rem;font-weight:bold;cursor:pointer;font-family:'Baloo 2'">Sperren</button></div>`;
                setTimeout(updateUnlockDisplay, 1000);
            } else { container.innerHTML = '<span style="color:#94a3b8;font-weight:bold;font-size:0.8rem;">🔒 Zu</span>'; }
        }

        const pad = document.getElementById('pin-pad');
        ["1","2","3","4","5","6","7","8","9","C","0","OK"].forEach(v => {
            const b = document.createElement('button'); b.className = "btn-key"; b.innerText = v;
            b.onclick = () => {
                if(v === "C") { currentPin = ""; updatePinDots(); }
                else if(v !== "OK" && currentPin.length < 4) {
                    currentPin += v; updatePinDots();
                    if(currentPin.length === 4) setTimeout(() => {
                        if(currentPin === PIN) { lastUnlockTime = Date.now(); if(pendingAction) pendingAction(); closeModal('pin-modal'); updateUnlockDisplay(); }
                        else { currentPin = ""; updatePinDots(); showMessage("Falsch! ❌"); }
                    }, 150);
                }
            };
            pad.appendChild(b);
        });

        initSync();
    </script>
</body>
</html>
